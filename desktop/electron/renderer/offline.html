<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src data:; script-src 'unsafe-inline';">
  <title>Pas de connexion Internet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(760px 460px at 8% -10%, #e0e7ff 0%, transparent 66%),
        radial-gradient(760px 520px at 100% 0, #dbeafe 0%, transparent 70%),
        #f8fafc;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 28px;
      user-select: none;
      -webkit-user-select: none;
    }
    .card {
      width: min(460px, 100%);
      background: #fff;
      border: 1px solid #eef2f7;
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, .10);
      padding: 40px 34px 32px;
      text-align: center;
    }
    .icon {
      width: 86px; height: 86px; margin: 0 auto 20px;
      border-radius: 50%;
      background: #fff7ed; border: 1px solid #fed7aa;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 42px; height: 42px; stroke: #c2410c; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -.3px; }
    p { font-size: 14.5px; line-height: 1.65; color: #475569; margin: 0 auto 24px; max-width: 40ch; }
    .btn {
      display: inline-flex; align-items: center; gap: 9px;
      font-size: 14.5px; font-weight: 600; color: #fff;
      background: #2563eb; border: none; border-radius: 12px;
      padding: 12px 26px; cursor: pointer;
      box-shadow: 0 10px 24px rgba(37, 99, 235, .30);
      transition: background .15s ease, transform .1s ease;
    }
    .btn:hover { background: #1d4ed8; }
    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: .7; cursor: default; }
    .btn .spin {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.45); border-top-color: #fff;
      animation: spin .7s linear infinite; display: none;
    }
    .btn.loading .spin { display: inline-block; }
    .btn.loading .ic { display: none; }
    .hint { margin-top: 18px; font-size: 12.5px; color: #94a3b8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) {
      body { background: #0b1120; color: #e2e8f0; }
      .card { background: #131c2e; border-color: #1e293b; box-shadow: 0 24px 60px rgba(0,0,0,.5); }
      p { color: #cbd5e1; }
      .hint { color: #64748b; }
    }
  </style>
</head>
<body>
  <main class="card" role="alert" aria-live="assertive">
    <div class="icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Pas de connexion Internet</h1>
    <p>Impossible de joindre votre espace Nexiste CRM. Vérifiez votre connexion réseau, puis réessayez.</p>
    <button id="retryBtn" class="btn" type="button">
      <span class="spin" aria-hidden="true"></span>
      <span class="ic" aria-hidden="true">&#8635;</span>
      <span id="retryLabel">Réessayer</span>
    </button>
    <div class="hint">La connexion sera relancée automatiquement dès son rétablissement.</div>
  </main>

  <script>
    (function () {
      var btn = document.getElementById('retryBtn');
      var label = document.getElementById('retryLabel');
      var retrying = false;

      function retry() {
        if (retrying) return;
        retrying = true;
        btn.classList.add('loading');
        btn.setAttribute('disabled', 'disabled');
        label.textContent = 'Nouvelle tentative…';
        if (window.nexisteDesktop && typeof window.nexisteDesktop.retry === 'function') {
          window.nexisteDesktop.retry();
        } else {
          // Repli hors contexte Electron.
          setTimeout(function () { location.reload(); }, 200);
        }
      }

      btn.addEventListener('click', retry);
      // Relance automatique dès que la connexion revient.
      window.addEventListener('online', retry);
    })();
  </script>
</body>
</html>
