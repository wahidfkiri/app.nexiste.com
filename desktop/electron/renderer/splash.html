<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src data:;">
  <title>Chargement…</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(700px 400px at 50% -10%, #1e293b 0%, #0b1120 70%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      user-select: none;
      -webkit-user-select: none;
    }
    .logo {
      width: 62px; height: 62px; border-radius: 16px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 800; color: #fff;
      box-shadow: 0 14px 34px rgba(37, 99, 235, .45);
    }
    .brand { font-size: 19px; font-weight: 700; letter-spacing: .2px; }
    .brand span { color: #60a5fa; }
    .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(148, 163, 184, .25);
      border-top-color: #60a5fa;
      animation: spin .8s linear infinite;
    }
    .status { font-size: 13px; color: #94a3b8; letter-spacing: .3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">N</div>
  <div class="brand">Nexiste <span>CRM</span></div>
  <div class="spinner"></div>
  <div class="status">Chargement de votre espace…</div>
</body>
</html>
